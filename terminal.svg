<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 190" width="100%" height="190" style="background: #0B0F19; border-radius: 8px; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <linearGradient id="window-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1424" />
      <stop offset="100%" stop-color="#070A14" />
    </linearGradient>
  </defs>

  <!-- Main Terminal Window Background -->
  <rect width="800" height="190" rx="8" fill="url(#window-grad)" stroke="#1F2937" stroke-width="1.5" />

  <!-- Window Header / Title Bar -->
  <path d="M 0 8 A 8 8 0 0 1 8 0 L 792 0 A 8 8 0 0 1 800 8 L 800 30 L 0 30 Z" fill="#161B22" />
  <line x1="0" y1="30" x2="800" y2="30" stroke="#21262D" stroke-width="1" />

  <!-- Window Control Buttons (Mac Style) -->
  <circle cx="20" cy="15" r="5.5" fill="#FF5F56" />
  <circle cx="38" cy="15" r="5.5" fill="#FFBD2E" />
  <circle cx="56" cy="15" r="5.5" fill="#27C93F" />

  <!-- Title Text -->
  <text x="400" y="19" text-anchor="middle" fill="#8B949E" font-size="12" font-weight="bold">LOC@KIDCUTE1412: ~ (ssh)</text>

  <!-- Console Content -->
  <g font-size="13" font-family="Courier New, monospace" xml:space="preserve">
    <!-- Command Prompt -->
    <text x="20" y="55" fill="#58A6FF" font-weight="bold">LOC@KIDCUTE1412:~$ <tspan fill="#F0F6FC" font-weight="normal">systemctl status engineer-profile.service</tspan></text>

    <!-- Service Status -->
    <text x="20" y="77" fill="#58A6FF">● <tspan fill="#F0F6FC" font-weight="bold">engineer-profile.service</tspan> - Le Tuan Loc (Backend Systems Engineer)</text>
    
    <!-- Loaded State -->
    <text x="35" y="99" fill="#8B949E">Loaded: <tspan fill="#58A6FF">active (running)</tspan> since Sep 2023 (University of Science - VNUHCM)</text>

    <!-- Current status message -->
    <text x="35" y="121" fill="#8B949E">Status: <tspan fill="#FF7B72">"Architecting high-concurrency, real-time &amp; spatial distributed systems"</tspan></text>

    <!-- Tech Stack Summary -->
    <text x="35" y="143" fill="#8B949E">Main Tech: <tspan fill="#E1E4E8">Java (Spring Boot) | Node.js (TypeScript) | PostgreSQL | Redis</tspan></text>

    <!-- Loading progress -->
    <text x="35" y="165" fill="#8B949E">Performance: [<tspan fill="#58A6FF">████████████████████</tspan>] <tspan fill="#58A6FF" font-weight="bold">100%</tspan> | High-Performance Active</text>
  </g>
</svg>
