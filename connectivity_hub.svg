<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120" style="background: #06080c; border-radius: 16px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Fonts & Styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=Outfit:wght@600;800&amp;display=swap');
      
      .mono-font {
        font-family: 'Fira Code', monospace;
      }
      .port-card {
        transition: transform 0.3s ease, filter 0.3s ease;
        cursor: pointer;
      }
      .port-card:hover {
        transform: translateY(-3px);
        filter: brightness(1.2);
      }
    </style>

    <!-- Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="120" rx="16" fill="#06080c" />
  <rect x="4" y="4" width="792" height="112" rx="12" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.08" />

  <!-- Port 1: Email -->
  <a href="mailto:letuanloc1412@gmail.com" target="_blank">
    <g transform="translate(20, 20)" class="port-card">
      <rect width="175" height="80" rx="8" fill="#0a0f1d" stroke="#d14836" stroke-width="1.2" stroke-opacity="0.8" />
      <path d="M 0 0 L 175 0" stroke="#d14836" stroke-width="3" stroke-linecap="round" />
      <!-- Gmail Icon -->
      <path d="M 20 25 L 35 35 L 50 25 M 20 25 L 20 45 L 50 45 L 50 25 Z" fill="none" stroke="#d14836" stroke-width="1.5" />
      <text x="60" y="32" fill="#ffffff" font-size="11" font-weight="bold">PORT: EMAIL</text>
      <text x="60" y="48" fill="#d14836" font-size="9" class="mono-font">letuanloc1412@</text>
      <text x="60" y="60" fill="#8f9cae" font-size="8.5" class="mono-font">gmail.com</text>
    </g>
  </a>

  <!-- Port 2: LinkedIn -->
  <a href="https://www.linkedin.com/in/l%E1%BB%99c-l%C3%AA-tu%E1%BA%A5n-341208390/" target="_blank">
    <g transform="translate(215, 20)" class="port-card">
      <rect width="175" height="80" rx="8" fill="#0a0f1d" stroke="#0077b5" stroke-width="1.2" stroke-opacity="0.8" />
      <path d="M 0 0 L 175 0" stroke="#0077b5" stroke-width="3" stroke-linecap="round" />
      <!-- LinkedIn Icon -->
      <rect x="22" y="24" width="20" height="20" rx="3" fill="none" stroke="#0077b5" stroke-width="1.5" />
      <text x="27" y="38" fill="#0077b5" font-size="12" font-weight="bold">in</text>
      <text x="60" y="32" fill="#ffffff" font-size="11" font-weight="bold">PORT: LINKEDIN</text>
      <text x="60" y="48" fill="#0077b5" font-size="9" class="mono-font">Lộc Lê Tuấn</text>
      <text x="60" y="60" fill="#8f9cae" font-size="8.5" class="mono-font">Professional Network</text>
    </g>
  </a>

  <!-- Port 3: Facebook -->
  <a href="https://www.facebook.com/le.tuan.loc.39104/?locale=vi_VN" target="_blank">
    <g transform="translate(410, 20)" class="port-card">
      <rect width="175" height="80" rx="8" fill="#0a0f1d" stroke="#1877f2" stroke-width="1.2" stroke-opacity="0.8" />
      <path d="M 0 0 L 175 0" stroke="#1877f2" stroke-width="3" stroke-linecap="round" />
      <!-- Facebook Icon -->
      <rect x="22" y="24" width="20" height="20" rx="3" fill="none" stroke="#1877f2" stroke-width="1.5" />
      <text x="30" y="39" fill="#1877f2" font-size="14" font-weight="bold">f</text>
      <text x="60" y="32" fill="#ffffff" font-size="11" font-weight="bold">PORT: FACEBOOK</text>
      <text x="60" y="48" fill="#1877f2" font-size="9" class="mono-font">Lê Tuấn Lộc</text>
      <text x="60" y="60" fill="#8f9cae" font-size="8.5" class="mono-font">Social Portal</text>
    </g>
  </a>

  <!-- Port 4: Location -->
  <g transform="translate(605, 20)" class="port-card">
    <rect width="175" height="80" rx="8" fill="#0a0f1d" stroke="#00ffaa" stroke-width="1.2" stroke-opacity="0.8" />
    <path d="M 0 0 L 175 0" stroke="#00ffaa" stroke-width="3" stroke-linecap="round" />
    <!-- Location Pin Icon -->
    <path d="M 32 24 C 27 24, 23 28, 23 33 C 23 39, 32 46, 32 46 C 32 46, 41 39, 41 33 C 41 28, 37 24, 32 24 Z" fill="none" stroke="#00ffaa" stroke-width="1.5" />
    <circle cx="32" cy="32" r="3" fill="#00ffaa" />
    <text x="60" y="32" fill="#ffffff" font-size="11" font-weight="bold">PORT: LOCATION</text>
    <text x="60" y="48" fill="#00ffaa" font-size="9" class="mono-font">HCM City, VN</text>
    <text x="60" y="60" fill="#8f9cae" font-size="8.5" class="mono-font">Active Base Coordinate</text>
  </g>
</svg>
