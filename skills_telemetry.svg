<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240" style="background: #06080c; border-radius: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Fonts & Interactive Styles -->
    <style>
      .title-font {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 900;
        letter-spacing: 0.05em;
      }
      .mono-font {
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
      }
      
      @keyframes drawArc {
        from { stroke-dashoffset: 283; }
      }
      
      /* Progress Arcs (Circumference 282.7) */
      .arc-95 { stroke-dasharray: 283; stroke-dashoffset: 14; animation: drawArc 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .arc-92 { stroke-dasharray: 283; stroke-dashoffset: 22; animation: drawArc 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .arc-90 { stroke-dasharray: 283; stroke-dashoffset: 28; animation: drawArc 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      .arc-88 { stroke-dasharray: 283; stroke-dashoffset: 34; animation: drawArc 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
      
      .gauge-card {
        transition: transform 0.2s ease;
      }
    </style>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040609" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>

    <!-- Background Grid -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.02" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="240" rx="16" fill="url(#bg-grad)" />
  <rect width="800" height="240" rx="16" fill="url(#grid)" />
  <rect x="4" y="4" width="792" height="232" rx="12" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.08" />

  <!-- Header Telemetry Info -->
  <g transform="translate(30, 25)">
    <text x="0" y="5" fill="#5c7a9c" font-size="10" class="mono-font" font-weight="bold" letter-spacing="1.5">TELEMETRY_RADAR // SKILLS_CORES_DIALS</text>
    <line x1="0" y1="12" x2="740" y2="12" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.1" />
  </g>

  <!-- ==================== GAUGE 1: SYSTEM ARCHITECTURE (Cyan) ==================== -->
  <g transform="translate(100, 130)" class="gauge-card">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#0f1925" stroke-width="1.5" />
    <!-- Static detailed tech ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="3 7" stroke-opacity="0.25" />
    
    <!-- Vector glow path (low opacity, thick stroke) -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00f0ff" stroke-width="10" stroke-opacity="0.25" transform="rotate(-90)" class="arc-95" />
    <!-- Core arc path -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" transform="rotate(-90)" class="arc-95" />
    
    <!-- Glow behind text -->
    <text x="0" y="4" text-anchor="middle" fill="#00f0ff" font-size="16" class="title-font" opacity="0.3" stroke="#00f0ff" stroke-width="3">95%</text>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="16" class="title-font">95%</text>
    
    <text x="0" y="80" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" class="mono-font">SYS_ARCH</text>
    <text x="0" y="94" text-anchor="middle" fill="#5c7a9c" font-size="8" class="mono-font">Architecture</text>
  </g>

  <!-- ==================== GAUGE 2: API TUNING (Purple) ==================== -->
  <g transform="translate(300, 130)" class="gauge-card">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#1b122c" stroke-width="1.5" />
    <circle cx="0" cy="0" r="58" fill="none" stroke="#7000ff" stroke-width="1" stroke-dasharray="3 7" stroke-opacity="0.25" />
    
    <circle cx="0" cy="0" r="45" fill="none" stroke="#7000ff" stroke-width="10" stroke-opacity="0.25" transform="rotate(-90)" class="arc-92" />
    <circle cx="0" cy="0" r="45" fill="none" stroke="#7000ff" stroke-width="6" stroke-linecap="round" transform="rotate(-90)" class="arc-92" />
    
    <text x="0" y="4" text-anchor="middle" fill="#7000ff" font-size="16" class="title-font" opacity="0.3" stroke="#7000ff" stroke-width="3">92%</text>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="16" class="title-font">92%</text>
    
    <text x="0" y="80" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" class="mono-font">API_OPT</text>
    <text x="0" y="94" text-anchor="middle" fill="#5c7a9c" font-size="8" class="mono-font">Performance</text>
  </g>

  <!-- ==================== GAUGE 3: DATABASE & SPATIAL (Orange) ==================== -->
  <g transform="translate(500, 130)" class="gauge-card">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#2d1d15" stroke-width="1.5" />
    <circle cx="0" cy="0" r="58" fill="none" stroke="#ff6600" stroke-width="1" stroke-dasharray="3 7" stroke-opacity="0.25" />
    
    <circle cx="0" cy="0" r="45" fill="none" stroke="#ff6600" stroke-width="10" stroke-opacity="0.25" transform="rotate(-90)" class="arc-90" />
    <circle cx="0" cy="0" r="45" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="round" transform="rotate(-90)" class="arc-90" />
    
    <text x="0" y="4" text-anchor="middle" fill="#ff6600" font-size="16" class="title-font" opacity="0.3" stroke="#ff6600" stroke-width="3">90%</text>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="16" class="title-font">90%</text>
    
    <text x="0" y="80" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" class="mono-font">DB_SCALE</text>
    <text x="0" y="94" text-anchor="middle" fill="#5c7a9c" font-size="8" class="mono-font">PGSQL &amp; H3</text>
  </g>

  <!-- ==================== GAUGE 4: ASYNC MESSAGING (Green) ==================== -->
  <g transform="translate(700, 130)" class="gauge-card">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#0c1f19" stroke-width="1.5" />
    <circle cx="0" cy="0" r="58" fill="none" stroke="#00ffaa" stroke-width="1" stroke-dasharray="3 7" stroke-opacity="0.25" />
    
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00ffaa" stroke-width="10" stroke-opacity="0.25" transform="rotate(-90)" class="arc-88" />
    <circle cx="0" cy="0" r="45" fill="none" stroke="#00ffaa" stroke-width="6" stroke-linecap="round" transform="rotate(-90)" class="arc-88" />
    
    <text x="0" y="4" text-anchor="middle" fill="#00ffaa" font-size="16" class="title-font" opacity="0.3" stroke="#00ffaa" stroke-width="3">88%</text>
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="16" class="title-font">88%</text>
    
    <text x="0" y="80" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold" class="mono-font">EVENT_BUS</text>
    <text x="0" y="94" text-anchor="middle" fill="#5c7a9c" font-size="8" class="mono-font">RabbitMQ/Kafka</text>
  </g>
</svg>
