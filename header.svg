<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240" style="background: #0B0F19; border-radius: 12px; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;">
  <!-- Filters for Neon Glow -->
  <defs>
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="purple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070913" />
      <stop offset="100%" stop-color="#121829" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0" />
      <stop offset="20%" stop-color="#8A2BE2" />
      <stop offset="50%" stop-color="#00f0ff" />
      <stop offset="80%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="12" fill="url(#bg-grad)" />
  <rect width="800" height="240" rx="12" fill="url(#grid)" />

  <!-- Cybernetic Grid Highlights (Vignette & Glowing Edges) -->
  <rect x="2" y="2" width="796" height="236" rx="10" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.15" />
  
  <!-- Glowing Corner Accents -->
  <path d="M 20 2 L 2 2 L 2 20" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyan-glow)" />
  <path d="M 780 2 L 798 2 L 798 20" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyan-glow)" />
  <path d="M 2 220 L 2 238 L 20 238" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyan-glow)" />
  <path d="M 780 238 L 798 238 L 798 220" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#cyan-glow)" />

  <!-- Abstract Tech Grid Lines & Nodes (Animated Circuit) -->
  <g stroke-opacity="0.3">
    <!-- Purple Tech Lines -->
    <path d="M 50 120 L 150 120 L 180 90 L 300 90" fill="none" stroke="#8A2BE2" stroke-width="1.5" />
    <path d="M 750 120 L 650 120 L 620 150 L 500 150" fill="none" stroke="#8A2BE2" stroke-width="1.5" />
    
    <!-- Cyan Tech Lines -->
    <path d="M 120 40 L 220 40 L 250 70 L 320 70" fill="none" stroke="#00f0ff" stroke-width="1" />
    <path d="M 680 200 L 580 200 L 550 170 L 480 170" fill="none" stroke="#00f0ff" stroke-width="1" />
  </g>

  <!-- Glowing Nodes with Animation -->
  <circle cx="300" cy="90" r="4" fill="#00f0ff" filter="url(#cyan-glow)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="150" r="4" fill="#8A2BE2" filter="url(#purple-glow)">
    <animate attributeName="r" values="3;6;3" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="320" cy="70" r="3" fill="#00f0ff" />
  <circle cx="480" cy="170" r="3" fill="#8A2BE2" />

  <!-- Center Console Content -->
  <!-- Status Badge -->
  <g transform="translate(340, 35)">
    <rect width="120" height="22" rx="11" fill="#111B30" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.5" />
    <circle cx="15" cy="11" r="4" fill="#00FF7F" filter="url(#cyan-glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <text x="28" y="15" fill="#00FF7F" font-size="10" font-weight="bold" letter-spacing="1.5" font-family="Courier New, monospace">SYSTEM: ACTIVE</text>
  </g>

  <!-- Name text with animated Neon Cyan Glow -->
  <text x="400" y="115" text-anchor="middle" font-size="42" font-weight="900" letter-spacing="8" fill="#FFFFFF" filter="url(#cyan-glow)" style="font-family: 'Outfit', 'Inter', sans-serif;">
    LE TUAN LOC
    <animate attributeName="opacity" values="0.95;1;0.95" dur="3s" repeatCount="indefinite" />
  </text>
  
  <!-- Underline Tech bar -->
  <path d="M 250 132 L 550 132" stroke="url(#bar-grad)" stroke-width="2" />

  <!-- Tagline: Typewriter effect style or pulsing -->
  <text x="400" y="165" text-anchor="middle" font-size="14" font-weight="600" letter-spacing="4" fill="#00f0ff" filter="url(#cyan-glow)" style="font-family: 'Courier New', Courier, monospace;">
    &lt; BACKEND DEVELOPER &amp; SYSTEM ARCHITECT &gt;
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </text>

  <!-- Bottom Details / Specs -->
  <text x="50" y="215" fill="#8f9cae" font-size="11" font-family="Courier New, monospace" letter-spacing="1">
    LOC@KIDCUTE1412:~$ npx init-profile --backend
  </text>
  
  <text x="750" y="215" text-anchor="end" fill="#00f0ff" font-size="11" font-family="Courier New, monospace" letter-spacing="1" stroke-opacity="0.8">
    [PORT: 8080] [TLS: 1.3] [DB: POSTGRESQL]
  </text>
</svg>
